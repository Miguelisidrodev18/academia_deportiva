<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Iluminación central tipo estadio -->
    <radialGradient id="stadiumLight" cx="50%" cy="50%" r="55%" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(700,250) scale(700,300) translate(-1,-1)">
      <stop offset="0%"   stop-color="#1f7a33"/>
      <stop offset="45%"  stop-color="#175e28"/>
      <stop offset="100%" stop-color="#0a2d10"/>
    </radialGradient>
    <!-- Viñeta oscura en bordes -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <!-- Base verde oscuro -->
  <rect width="1400" height="500" fill="#0d3a16"/>

  <!-- Franjas de siega (patrón tablero claro/oscuro) -->
  <rect x="0"    y="0" width="140" height="500" fill="#114d1e"/>
  <rect x="280"  y="0" width="140" height="500" fill="#114d1e"/>
  <rect x="560"  y="0" width="140" height="500" fill="#114d1e"/>
  <rect x="840"  y="0" width="140" height="500" fill="#114d1e"/>
  <rect x="1120" y="0" width="140" height="500" fill="#114d1e"/>

  <!-- Iluminación radial tipo focos de estadio -->
  <ellipse cx="700" cy="250" rx="620" ry="310" fill="url(#stadiumLight)"/>

  <!-- Viñeta oscura en bordes -->
  <rect width="1400" height="500" fill="url(#vignette)"/>

  <!-- ═══ LÍNEAS DE CAMPO ═══ -->
  <!-- Borde del campo -->
  <rect x="70" y="25" width="1260" height="450" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="3"/>

  <!-- Línea de centro -->
  <line x1="700" y1="25" x2="700" y2="475" stroke="rgba(255,255,255,0.70)" stroke-width="2.5"/>

  <!-- Círculo central -->
  <circle cx="700" cy="250" r="88" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2.5"/>
  <!-- Punto central -->
  <circle cx="700" cy="250" r="5" fill="rgba(255,255,255,0.80)"/>

  <!-- ─── Área penal IZQUIERDA ─── -->
  <!-- Área grande -->
  <rect x="70" y="155" width="185" height="190" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
  <!-- Área chica -->
  <rect x="70" y="198" width="72" height="104" fill="none" stroke="rgba(255,255,255,0.60)" stroke-width="2"/>
  <!-- Punto penal -->
  <circle cx="190" cy="250" r="4" fill="rgba(255,255,255,0.75)"/>
  <!-- Arco D (exterior al área) -->
  <path d="M 255 201 A 90 90 0 0 1 255 299" fill="none" stroke="rgba(255,255,255,0.58)" stroke-width="2"/>

  <!-- ─── Área penal DERECHA ─── -->
  <!-- Área grande -->
  <rect x="1145" y="155" width="185" height="190" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
  <!-- Área chica -->
  <rect x="1258" y="198" width="72" height="104" fill="none" stroke="rgba(255,255,255,0.60)" stroke-width="2"/>
  <!-- Punto penal -->
  <circle cx="1210" cy="250" r="4" fill="rgba(255,255,255,0.75)"/>
  <!-- Arco D -->
  <path d="M 1145 201 A 90 90 0 0 0 1145 299" fill="none" stroke="rgba(255,255,255,0.58)" stroke-width="2"/>

  <!-- ─── Arcos de esquina ─── -->
  <path d="M 70  48 A 22 22 0 0 0 92  25" fill="none" stroke="rgba(255,255,255,0.62)" stroke-width="2"/>
  <path d="M 1330 25 A 22 22 0 0 0 1308 48" fill="none" stroke="rgba(255,255,255,0.62)" stroke-width="2"/>
  <path d="M 70  452 A 22 22 0 0 1 92 475" fill="none" stroke="rgba(255,255,255,0.62)" stroke-width="2"/>
  <path d="M 1330 475 A 22 22 0 0 1 1308 452" fill="none" stroke="rgba(255,255,255,0.62)" stroke-width="2"/>
</svg>
